<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #333;
            overflow: hidden;
        }
        nav a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }
        nav a:hover {
            background-color: #ddd;
            color: black;
        }
        .container {
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        .post {
            background-color: white;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的个人博客</h1>
        <p>分享知识，记录成长</p>
    </header>

    <nav>
        <a href="#home">首页</a>
        <a href="#about">关于我</a>
        <a href="#posts">文章</a>
        <a href="#contact">联系</a>
    </nav>

    <div class="container">
        <section id="home">
            <h2>最新文章</h2>
            <div class="post">
                <h3>如何学习编程</h3>
                <p>编程是一项非常有趣的技能。在这篇文章中，我将分享一些学习编程的技巧和资源。</p>
            </div>
            <div class="post">
                <h3>旅行的意义</h3>
                <p>旅行可以开阔我们的眼界，这篇文章记录了我最近的一次旅行经历。</p>
            </div>
        </section>

        <section id="about">
            <h2>关于我</h2>
            <p>你好！我是一个热爱技术与写作的人，喜欢通过博客分享自己的见解和经验。</p>
        </section>

        <section id="contact">
            <h2>联系我</h2>
            <p>如果你有任何问题或想交流，可以通过以下方式找到我：</p>
            <ul>
                <li>Email: example@example.com</li>
                <li>Twitter: @example</li>
            </ul>
        </section>
    </div>

    <footer>
        <p>&copy; 2023 我的个人博客. 版权所有.</p>
    </footer>
</body>
</html>
